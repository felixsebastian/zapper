name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PM2
        run: npm install -g pm2

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Debug npm publish auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN: absent; Changesets will try OIDC trusted publishing"
            exit 0
          fi

          token_len=${#NPM_TOKEN}
          token_fingerprint=$(printf '%s' "$NPM_TOKEN" | shasum -a 256 | cut -c1-12)
          tmp_npmrc="$(mktemp)"
          trap 'rm -f "$tmp_npmrc"' EXIT
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$tmp_npmrc"

          echo "NPM_TOKEN length: ${token_len}"
          echo "NPM_TOKEN sha256 prefix: ${token_fingerprint}"
          echo "npm whoami: $(NPM_CONFIG_USERCONFIG="$tmp_npmrc" npm whoami)"
          echo "npm package collaborators:"
          NPM_CONFIG_USERCONFIG="$tmp_npmrc" npm access list collaborators @mp-lb/zapper --json

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: release"
          commit: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
