project: myproj
env: [.env]
git_method: ssh
native:
  frontend:
    aliases: [f]
    repo: myorg/frontend
    cmd: npm run dev
    cwd: ./frontend
    env: "*"
  api:
    aliases: [a]
    repo: myorg/api
    cmd: npm run dev
    cwd: ./api
    env: "*"
docker:
  database:
    aliases: [db]
    image: postgres:15
    ports:
      - "5432:5432"
    env: "*"
    volumes:
      - name: postgres_data
        internal_dir: /var/lib/postgresql/data
  redis:
    name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
tasks:
  build:
    desc: Build both services
    env: "*"
    cmds:
      - npm ci --prefix ./frontend
      - npm run build --prefix ./frontend
      - npm ci --prefix ./api
      - npm run build --prefix ./api
  test:
    desc: Run tests for both services
    cmds:
      - { task: build }
      - npm test --prefix ./frontend -- --watch=false
      - npm test --prefix ./api -- --watch=false
