project: whitelist-example

env: [.env.common, .env.user]

native:
  frontend:
    cmd: npm run dev
    env: env-routes/frontend.yaml

  backend:
    cmd: npm run server
    env: env-routes/backend.yaml

  monitoring:
    cmd: npm run monitoring
    env: env-routes/monitoring.yaml

docker:
  database:
    image: postgres:15
    env: env-routes/database.yaml
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    env: env-routes/common.yaml
    ports: ["6379:6379"]

tasks:
  deploy:
    desc: Deploy the application
    env: env-routes/common.yaml
    cmds:
      - npm run build
      - npm run deploy
